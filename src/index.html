<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字人壁纸</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: transparent;
      overflow: hidden;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    
    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    
    /* ========== 壁纸背景 - 暗夜金月风格 ========== */
    #wallpaper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      /* 深海军蓝底色 */
      background: linear-gradient(135deg, #0a1628 0%, #1a2744 50%, #0d1f3c 100%);
    }
    
    /* 金色几何菱形纹路 */
    #wallpaper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        /* 菱形图案 */
        linear-gradient(45deg, transparent 48%, rgba(212, 175, 125, 0.08) 49%, rgba(212, 175, 125, 0.08) 51%, transparent 52%),
        linear-gradient(-45deg, transparent 48%, rgba(212, 175, 125, 0.08) 49%, rgba(212, 175, 125, 0.08) 51%, transparent 52%);
      background-size: 80px 80px;
      opacity: 0.6;
    }
    
    /* 副菱形层 */
    #wallpaper::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(45deg, transparent 48%, rgba(212, 175, 125, 0.05) 49%, rgba(212, 175, 125, 0.05) 51%, transparent 52%),
        linear-gradient(-45deg, transparent 48%, rgba(212, 175, 125, 0.05) 49%, rgba(212, 175, 125, 0.05) 51%, transparent 52%);
      background-size: 160px 160px;
      transform: rotate(0deg);
    }
    
    /* 金色月亮 - 右上角 */
    .moon {
      position: absolute;
      top: 8%;
      right: 12%;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffd700 0%, #daa520 50%, #b8860b 100%);
      box-shadow: 
        0 0 40px rgba(255, 215, 0, 0.4),
        0 0 80px rgba(218, 165, 32, 0.2),
        inset -10px -10px 20px rgba(139, 90, 43, 0.3);
    }
    
    /* 月亮光晕 */
    .moon::after {
      content: '';
      position: absolute;
      top: -20px;
      left: -20px;
      right: -20px;
      bottom: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
    }
    
    /* 顶部渐变光晕 */
    .top-glow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 300px;
      background: linear-gradient(180deg, rgba(255, 215, 0, 0.05) 0%, transparent 100%);
      pointer-events: none;
    }
    
    /* 底部暗角 */
    .vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.4) 100%);
      pointer-events: none;
    }
    
    /* 水平金线装饰 */
    .gold-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(212, 175, 125, 0.3) 20%, rgba(212, 175, 125, 0.5) 50%, rgba(212, 175, 125, 0.3) 80%, transparent 100%);
    }
    .gold-line.top { top: 15%; }
    .gold-line.bottom { bottom: 25%; }
    
    /* 数字人区域 */
    #digital-human {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 600px;
    }
    
    #digital-human img,
    #digital-human video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    /* 消息气泡 */
    #message-bubble {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      padding: 20px 30px;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      display: none;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    
    #message-bubble .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin-right: 15px;
      display: inline-block;
      vertical-align: middle;
    }
    
    #message-bubble .content {
      display: inline-block;
      vertical-align: middle;
      max-width: 400px;
    }
    
    #message-bubble .sender {
      font-weight: bold;
      color: #333;
      font-size: 14px;
    }
    
    #message-bubble .text {
      color: #555;
      font-size: 16px;
      margin-top: 5px;
    }
    
    /* WebView2 容器（用于嵌入SadTalker等） */
    #webview-container {
      display: none;
    }
    
    webview {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="container">
    <!-- 壁纸背景层 -->
    <div id="wallpaper">
      <div class="moon"></div>
      <div class="top-glow"></div>
      <div class="gold-line top"></div>
      <div class="gold-line bottom"></div>
      <div class="vignette"></div>
    </div>
    
    <!-- 消息气泡 -->
    <div id="message-bubble">
      <span class="avatar"></span>
      <div class="content">
        <div class="sender">Slack</div>
        <div class="text" id="message-text"></div>
      </div>
    </div>
    
    <!-- 数字人区域 -->
    <div id="digital-human">
      <!-- 默认显示静态图片 -->
      <img id="human-image" src="./assets/default-avatar.svg" alt="数字人">
      
      <!-- WebView2 容器（可选） -->
      <div id="webview-container">
        <webview id="sadtalker-webview" src="https://sadtalker.github.io"></webview>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
