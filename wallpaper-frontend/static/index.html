<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>数字人壁纸</title>
  <style>
    * { margin: 0; padding: 0; }
    body { 
      overflow: hidden; 
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #e0e0e0;
      font-size: 14px;
      background: rgba(0,0,0,0.6);
      padding: 15px 20px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #info div { margin: 5px 0; }
    #status {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
    }
    .connected { background: #4CAF50; color: white; }
    .disconnected { background: #F44336; color: white; }
  </style>
</head>
<body>
  <div id="info">
    <div style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">🎭 Digital Avatar</div>
    <div>📌 动作: <span id="action" style="color: #64B5F6">idle</span></div>
    <div>😊 情感: <span id="emotion" style="color: #81C784">neutral</span></div>
    <div>💬 内容: <span id="text" style="color: #FFB74D">-</span></div>
    <div>🎯 目标: <span id="target" style="color: #BA68C8">-</span></div>
  </div>
  <div id="status" class="disconnected">🔴 未连接</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ============ 状态 ============
    let avatar = null;
    let currentAction = 'idle';
    let currentEmotion = 'neutral';

    const emotionColors = {
      happy: 0x4CAF50,
      sad: 0x2196F3,
      angry: 0xF44336,
      neutral: 0x9E9E9E,
      excited: 0xFF9800,
      surprised: 0x9C27B0
    };

    // ============ Three.js 场景 ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // 灯光
    const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0x64B5F6, 0.8);
    pointLight.position.set(-3, 2, 4);
    scene.add(pointLight);

    // ============ 创建数字人 ============
    function createAvatar() {
      const group = new THREE.Group();

      // 身体
      const bodyGeo = new THREE.CylinderGeometry(0.6, 0.8, 2, 32);
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3f51b5, roughness: 0.5 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = -0.5;
      group.add(body);

      // 头部
      const headGeo = new THREE.SphereGeometry(0.7, 32, 32);
      const headMat = new THREE.MeshStandardMaterial({ color: emotionColors.neutral, roughness: 0.3 });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = 1.4;
      head.name = 'head';
      group.add(head);

      // 眼睛
      const eyeGeo = new THREE.SphereGeometry(0.1, 16, 16);
      const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      
      const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
      leftEye.position.set(-0.2, 1.5, 0.6);
      leftEye.name = 'leftEye';
      group.add(leftEye);

      const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
      rightEye.position.set(0.2, 1.5, 0.6);
      rightEye.name = 'rightEye';
      group.add(rightEye);

      // 瞳孔
      const pupilGeo = new THREE.SphereGeometry(0.05, 8, 8);
      const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
      
      const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
      leftPupil.position.set(-0.2, 1.5, 0.68);
      group.add(leftPupil);

      const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
      rightPupil.position.set(0.2, 1.5, 0.68);
      group.add(rightPupil);

      // 嘴巴
      const mouthGeo = new THREE.TorusGeometry(0.12, 0.025, 8, 16, Math.PI);
      const mouthMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
      const mouth = new THREE.Mesh(mouthGeo, mouthMat);
      mouth.position.set(0, 1.2, 0.65);
      mouth.rotation.x = Math.PI;
      mouth.name = 'mouth';
      group.add(mouth);

      return group;
    }

    avatar = createAvatar();
    scene.add(avatar);

    // ============ UI 更新 ============
    function updateUI(action, emotion, text, target) {
      document.getElementById('action').textContent = action;
      document.getElementById('emotion').textContent = emotion;
      document.getElementById('text').textContent = text || '-';
      document.getElementById('target').textContent = target || '-';
    }

    // ============ WebSocket 连接 ============
    let ws = null;
    const statusEl = document.getElementById('status');

    function connect() {
      ws = new WebSocket('ws://localhost:18790');

      ws.onopen = () => {
        console.log('✅ 已连接 Slack 中间件');
        statusEl.textContent = '🟢 已连接';
        statusEl.className = 'connected';
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          console.log('📥 收到动作:', data);
          
          if (data.protocol === 'avatar_action_v1') {
            handleAvatarAction(data);
          }
        } catch (e) {
          console.error('❌ 解析失败:', e);
        }
      };

      ws.onclose = () => {
        console.log('🔌 断开连接，5秒后重连...');
        statusEl.textContent = '🔴 未连接';
        statusEl.className = 'disconnected';
        setTimeout(connect, 5000);
      };

      ws.onerror = (err) => {
        console.error('⚠️ WebSocket错误');
      };
    }

    connect();

    // ============ 动作处理 ============
    function handleAvatarAction(action) {
      currentAction = action.action;
      currentEmotion = action.emotion;

      updateUI(action.action, action.emotion, action.text, action.target);

      // 更新头部颜色
      const head = avatar.getObjectByName('head');
      if (head) {
        const color = emotionColors[action.emotion] || emotionColors.neutral;
        head.material.color.setHex(color);
      }

      // 执行对应动画
      switch (action.action) {
        case 'speak':
          playSpeakAnimation();
          break;
        case 'wave':
          playWaveAnimation();
          break;
        case 'nod':
          playNodAnimation();
          break;
        case 'dance':
          playDanceAnimation();
          break;
        case 'think':
          playThinkAnimation();
          break;
        default:
          playIdleAnimation();
      }
    }

    // ============ 动画 ============
    let animationId = null;

    function playIdleAnimation() {
      if (animationId) cancelAnimationFrame(animationId);
      
      let time = 0;
      function animate() {
        time += 0.01;
        avatar.position.y = Math.sin(time) * 0.05;
        avatar.rotation.y = Math.sin(time * 0.5) * 0.05;
        renderer.render(scene, camera);
        animationId = requestAnimationFrame(animate);
      }
      animate();
    }

    function playSpeakAnimation() {
      const head = avatar.getObjectByName('head');
      let startTime = Date.now();
      
      function animate() {
        if (Date.now() - startTime > 3000) {
          playIdleAnimation();
          return;
        }
        const t = Date.now() * 0.015;
        head.position.x = Math.sin(t) * 0.1;
        renderer.render(scene, camera);
        animationId = requestAnimationFrame(animate);
      }
      animate();
    }

    function playWaveAnimation() {
      let waves = 0;
      function animate() {
        if (waves > 3) {
          playIdleAnimation();
          return;
        }
        const t = Date.now() * 0.01;
        avatar.rotation.y = Math.sin(t) * 0.8;
        if (Math.sin(t) > 0.9) waves++;
        renderer.render(scene, camera);
        animationId = requestAnimationFrame(animate);
      }
      animate();
    }

    function playNodAnimation() {
      let nods = 0;
      function animate() {
        if (nods > 2) {
          playIdleAnimation();
          return;
        }
        const t = Date.now() * 0.02;
        avatar.rotation.x = Math.sin(t) * 0.3;
        if (Math.sin(t) < -0.9) nods++;
        renderer.render(scene, camera);
        animationId = requestAnimationFrame(animate);
      }
      animate();
    }

    function playDanceAnimation() {
      let startTime = Date.now();
      function animate() {
        if (Date.now() - startTime > 5000) {
          playIdleAnimation();
          return;
        }
        const t = Date.now() * 0.008;
        avatar.position.y = Math.abs(Math.sin(t)) * 0.3;
        avatar.rotation.y = Math.sin(t) * 0.4;
        renderer.render(scene, camera);
        animationId = requestAnimationFrame(animate);
      }
      animate();
    }

    function playThinkAnimation() {
      let startTime = Date.now();
      function animate() {
        if (Date.now() - startTime > 4000) {
          playIdleAnimation();
          return;
        }
        const head = avatar.getObjectByName('head');
        head.position.y = 1.4 + Math.sin(Date.now() * 0.003) * 0.1;
        renderer.render(scene, camera);
        animationId = requestAnimationFrame(animate);
      }
      animate();
    }

    // ============ 窗口调整 ============
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 启动待机动画
    playIdleAnimation();
  </script>
</body>
</html>
